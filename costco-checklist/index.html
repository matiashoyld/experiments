<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Costco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      padding: 0 0 2rem;
    }

    header {
      background: linear-gradient(135deg, #e23744, #c62828);
      padding: 1.5rem 1.25rem 1.25rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .progress {
      margin-top: .75rem;
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #fff;
      border-radius: 999px;
      transition: width .4s ease;
      width: 0%;
    }

    .progress-text {
      font-size: .85rem;
      margin-top: .4rem;
      opacity: .9;
    }

    .content {
      padding: 1rem 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .category {
      margin-bottom: 1.25rem;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem 0;
      margin-bottom: .4rem;
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
    }

    .category-icon {
      font-size: 1.1rem;
    }

    .category-items {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .item {
      background: #16213e;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      cursor: pointer;
      transition: all .25s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .item:active {
      transform: scale(.97);
    }

    .item.checked {
      background: #0f3d0f;
      border-color: #4caf50;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      opacity: .55;
    }

    .item.checked .item-img {
      opacity: .4;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2.5px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s ease;
      font-size: 1rem;
    }

    .item.checked .checkbox {
      background: #4caf50;
      border-color: #4caf50;
    }

    .item-img {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: #0f3460;
      transition: opacity .25s ease;
    }

    .item-img-fallback {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      flex-shrink: 0;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      transition: opacity .25s ease;
    }

    .item.checked .item-img-fallback {
      opacity: .4;
    }

    .item-text {
      font-size: 1.15rem;
      transition: all .25s ease;
      flex: 1;
    }

    .done-banner {
      text-align: center;
      padding: 2rem 1rem;
      display: none;
    }

    .done-banner.show {
      display: block;
    }

    .done-banner .big-emoji {
      font-size: 4rem;
      animation: bounce 0.6s ease infinite alternate;
    }

    .done-banner p {
      font-size: 1.2rem;
      margin-top: .5rem;
      font-weight: 600;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    .reset-btn {
      display: block;
      margin: 1rem auto 0;
      background: rgba(255,255,255,.1);
      color: #aaa;
      border: 1px solid rgba(255,255,255,.15);
      padding: .6rem 1.5rem;
      border-radius: 10px;
      font-size: .9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Lista Costco</h1>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-text" id="progressText">0 / 15</div>
</header>

<div class="content" id="content"></div>

<div class="done-banner" id="doneBanner">
  <div class="big-emoji">🎉</div>
  <p>¡Listo! Todo en el carro</p>
</div>

<button class="reset-btn" id="resetBtn">Borrar todo</button>

<script>
const categories = [
  {
    name: "Panadería",
    icon: "🥖",
    items: [
      { name: "Pan artesano", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300", emoji: "🍞" },
    ]
  },
  {
    name: "Frutas y Verduras",
    icon: "🥬",
    items: [
      { name: "Tomate", img: "https://images.unsplash.com/photo-1546470427-0d4db154ceb8?w=300", emoji: "🍅" },
      { name: "Papas", img: "https://images.unsplash.com/photo-1518977676601-b53f82ber630?w=300", emoji: "🥔" },
    ]
  },
  {
    name: "Carnes y Pescado",
    icon: "🥩",
    items: [
      { name: "Salmón", img: "https://images.unsplash.com/photo-1499125562588-29fb8a56b5d5?w=300", emoji: "🐟" },
      { name: "Filetes de pollo", img: "https://images.unsplash.com/photo-1604503468506-a8da13d82571?w=300", emoji: "🍗" },
      { name: "Cerdo", img: "https://images.unsplash.com/photo-1602470520998-f4a52199a3d6?w=300", emoji: "🥩" },
      { name: "Carne molida", img: "https://images.unsplash.com/photo-1588168333986-5078d3ae3976?w=300", emoji: "🥩" },
      { name: "Pollo asado", img: "https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=300", emoji: "🍗" },
    ]
  },
  {
    name: "Lácteos y Refrigerados",
    icon: "🧊",
    items: [
      { name: "Leche", img: "https://images.unsplash.com/photo-1563636619-e9143da7973b?w=300", emoji: "🥛" },
      { name: "Huevos", img: "https://images.unsplash.com/photo-1582722872445-44dc5f7e3c8f?w=300", emoji: "🥚" },
      { name: "Mantequilla", img: "https://images.unsplash.com/photo-1589985270826-4b7bb135bc0d?w=300", emoji: "🧈" },
      { name: "Queso aperitivos", img: "https://images.unsplash.com/photo-1486297678162-eb2a19b0a32d?w=300", emoji: "🧀" },
    ]
  },
  {
    name: "Abarrotes",
    icon: "🏪",
    items: [
      { name: "Salsa de tomate", img: "https://images.unsplash.com/photo-1472476443507-c7a5948772fc?w=300", emoji: "🍅" },
      { name: "Avena", img: "https://images.unsplash.com/photo-1614961233913-a5113e3d6b48?w=300", emoji: "🥣" },
      { name: "Salsa de pesto (tarro)", img: "https://images.unsplash.com/photo-1592667712001-5b04e5baa04f?w=300", emoji: "🌿" },
    ]
  },
];

// Flatten for indexing
const allItems = categories.flatMap(c => c.items);
const STORAGE_KEY = "costco-checked-v2";

function loadChecked() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveChecked(checked) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
}

function render() {
  const content = document.getElementById("content");
  const checked = loadChecked();
  content.innerHTML = "";

  let globalIndex = 0;

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "category";

    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        ${cat.name}
      </div>
    `;

    const itemsContainer = document.createElement("div");
    itemsContainer.className = "category-items";

    cat.items.forEach(item => {
      const idx = globalIndex++;
      const isChecked = checked.includes(idx);
      const div = document.createElement("div");
      div.className = "item" + (isChecked ? " checked" : "");
      div.innerHTML = `
        <div class="checkbox">${isChecked ? "✓" : ""}</div>
        <img class="item-img" src="${item.img}" alt="${item.name}" loading="lazy"
          onerror="this.outerHTML='<div class=\\'item-img-fallback\\'>${item.emoji}</div>'">
        <span class="item-text">${item.name}</span>
      `;
      div.addEventListener("click", () => toggle(idx));
      itemsContainer.appendChild(div);
    });

    section.appendChild(itemsContainer);
    content.appendChild(section);
  });

  updateProgress(checked.length);
}

function toggle(index) {
  const checked = loadChecked();
  const pos = checked.indexOf(index);
  if (pos === -1) checked.push(index);
  else checked.splice(pos, 1);
  saveChecked(checked);
  render();
}

function updateProgress(count) {
  const total = allItems.length;
  const pct = Math.round((count / total) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${count} / ${total}`;
  document.getElementById("doneBanner").className =
    "done-banner" + (count === total ? " show" : "");
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("¿Borrar todos los checks?")) {
    saveChecked([]);
    render();
  }
});

render();
</script>
</body>
</html>

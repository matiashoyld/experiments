<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Costco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      padding: 0 0 2rem;
    }

    header {
      background: linear-gradient(135deg, #e23744, #c62828);
      padding: 1.5rem 1.25rem 1.25rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .progress {
      margin-top: .75rem;
      background: rgba(255,255,255,.2);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #fff;
      border-radius: 999px;
      transition: width .4s ease;
      width: 0%;
    }

    .progress-text {
      font-size: .85rem;
      margin-top: .4rem;
      opacity: .9;
    }

    .list {
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .item {
      background: #16213e;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: .85rem;
      cursor: pointer;
      transition: all .25s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .item:active {
      transform: scale(.97);
    }

    .item.checked {
      background: #0f3d0f;
      border-color: #4caf50;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      opacity: .55;
    }

    .checkbox {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 2.5px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s ease;
      font-size: 1rem;
    }

    .item.checked .checkbox {
      background: #4caf50;
      border-color: #4caf50;
    }

    .item-text {
      font-size: 1.1rem;
      transition: all .25s ease;
    }

    .emoji {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .done-banner {
      text-align: center;
      padding: 2rem 1rem;
      display: none;
    }

    .done-banner.show {
      display: block;
    }

    .done-banner .big-emoji {
      font-size: 4rem;
      animation: bounce 0.6s ease infinite alternate;
    }

    .done-banner p {
      font-size: 1.2rem;
      margin-top: .5rem;
      font-weight: 600;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    .reset-btn {
      display: block;
      margin: 1.5rem auto 0;
      background: rgba(255,255,255,.1);
      color: #aaa;
      border: 1px solid rgba(255,255,255,.15);
      padding: .6rem 1.5rem;
      border-radius: 10px;
      font-size: .9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Lista Costco</h1>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-text" id="progressText">0 / 15</div>
</header>

<div class="list" id="list"></div>

<div class="done-banner" id="doneBanner">
  <div class="big-emoji">🎉</div>
  <p>¡Listo! Todo en el carro</p>
</div>

<button class="reset-btn" id="resetBtn">Borrar todo</button>

<script>
const items = [
  { name: "Salsa de tomate", emoji: "🍅" },
  { name: "Pan artesano", emoji: "🍞" },
  { name: "Tomate", emoji: "🍅" },
  { name: "Salmón", emoji: "🐟" },
  { name: "Filetes de pollo", emoji: "🍗" },
  { name: "Cerdo", emoji: "🥩" },
  { name: "Carne molida", emoji: "🥩" },
  { name: "Leche", emoji: "🥛" },
  { name: "Huevos", emoji: "🥚" },
  { name: "Mantequilla", emoji: "🧈" },
  { name: "Queso aperitivos", emoji: "🧀" },
  { name: "Papas", emoji: "🥔" },
  { name: "Avena", emoji: "🥣" },
  { name: "Salsa de pesto (tarro)", emoji: "🌿" },
  { name: "Pollo asado", emoji: "🍗" },
];

const STORAGE_KEY = "costco-checked";

function loadChecked() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveChecked(checked) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
}

function render() {
  const list = document.getElementById("list");
  const checked = loadChecked();
  list.innerHTML = "";

  items.forEach((item, i) => {
    const isChecked = checked.includes(i);
    const div = document.createElement("div");
    div.className = "item" + (isChecked ? " checked" : "");
    div.innerHTML = `
      <div class="checkbox">${isChecked ? "✓" : ""}</div>
      <span class="emoji">${item.emoji}</span>
      <span class="item-text">${item.name}</span>
    `;
    div.addEventListener("click", () => toggle(i));
    list.appendChild(div);
  });

  updateProgress(checked.length);
}

function toggle(index) {
  const checked = loadChecked();
  const pos = checked.indexOf(index);
  if (pos === -1) checked.push(index);
  else checked.splice(pos, 1);
  saveChecked(checked);
  render();
}

function updateProgress(count) {
  const total = items.length;
  const pct = Math.round((count / total) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${count} / ${total}`;
  document.getElementById("doneBanner").className =
    "done-banner" + (count === total ? " show" : "");
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("¿Borrar todos los checks?")) {
    saveChecked([]);
    render();
  }
});

render();
</script>
</body>
</html>
